# 1. 데이터베이스 연결 설정 (반드시 jdbc:mysql:// 로 시작해야 합니다)
spring.datasource.url=jdbc:mysql://localhost:3306/mydb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
# 2. 본인의 MySQL 계정 아이디 (기본값 root)
spring.datasource.username=root

# 3. 본인의 MySQL 비밀번호를 적어주세요 (오타가 나지 않도록 주의!)
spring.datasource.password=mini9265@

# 4. JPA/Hibernate 로그 설정
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 5. 테이블 초기화 전략 (이미 Workbench에서 만들었으므로 update로 지정)
spring.jpa.hibernate.ddl-auto=update