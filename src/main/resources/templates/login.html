<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dev-Path 로그인</title>
</head>
<body>
<h2>나의 로드맵 이어가기 (로그인)</h2>

<div th:if="${param.error != null}" style="color: red; font-weight: bold; margin-bottom: 15px;">
    로그인 실패: 아이디 또는 비밀번호를 확인하세요.
</div>

<form th:action="@{/user/login}" method="POST">
    <label>사용자 아이디(영문):</label>
    <input type="text" name="name" required><br><br>

    <label>비밀번호:</label>
    <input type="password" name="password" required><br><br>

    <button type="submit">로그인</button>
    <button type="button" th:onclick="|location.href='@{/}'|">돌아가기</button>
</form>
</body>
</html>
